<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>缴费系统</title>
    <script>
      // GitHub Pages SPA：还原被 404.html 编码的路径
      (function() {
        var p = window.location.search.slice(1);
        if (p.startsWith('p=')) {
          window.history.replaceState(null, null, '/' + decodeURIComponent(p.slice(2)));
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
